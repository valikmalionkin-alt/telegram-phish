{% extends "base.html" %}
{% block content %}
<form action="/login" method="post">
    <input type="text" name="username" placeholder="Phone number or username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Sign In</button>
</form>
<p style="text-align: center; margin-top: 20px;">Don't have an account? <a href="https://telegram.org/">Sign up</a></p>
{% endblock %}
